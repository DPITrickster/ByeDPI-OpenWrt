name: Simple Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */14 * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get upstream latest release tag
        id: get_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/hufrea/byedpi/releases/latest | grep -Po '"tag_name": "\K.+?(?=")')
          echo "Latest upstream tag: $TAG"

          if [ -f .last_simple_release_tag ]; then
            LAST=$(cat .last_simple_release_tag)
          else
            LAST=""
          fi
          echo "Last processed tag: $LAST"

          if [ "$TAG" = "$LAST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No new release. Skipping build."
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Setup nFPM
        if: steps.get_tag.outputs.skip == 'false'
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Download binaries and build packages
        if: steps.get_tag.outputs.skip == 'false'
        env:
          TAG: ${{ steps.get_tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${TAG#v}
          
          # Map OpenWRT architectures to ByeDPI pre-built generic architectures
          declare -A arch_map=(
            ["aarch64_cortex-a53"]="aarch64"
            ["aarch64_cortex-a72"]="aarch64"
            ["aarch64_cortex-a76"]="aarch64"
            ["aarch64_generic"]="aarch64"
            ["arm_arm1176jzf-s_vfp"]="armv6"
            ["arm_arm926ej-s"]="armv6"
            ["arm_cortex-a15_neon-vfpv4"]="armv7l"
            ["arm_cortex-a5_vfpv4"]="armv7l"
            ["arm_cortex-a7"]="armv7l"
            ["arm_cortex-a7_neon-vfpv4"]="armv7l"
            ["arm_cortex-a7_vfpv4"]="armv7l"
            ["arm_cortex-a8_vfpv3"]="armv7l"
            ["arm_cortex-a9"]="armv7l"
            ["arm_cortex-a9_neon"]="armv7l"
            ["arm_cortex-a9_vfpv3-d16"]="armv7l"
            ["arm_fa526"]="armv7l"
            ["arm_mpcore"]="armv7l"
            ["arm_xscale"]="armv7l"
            ["mips64_octeonplus"]="mips"
            ["mips_24kc"]="mips"
            ["mips_4kec"]="mips"
            ["mips_mips32"]="mips"
            ["mipsel_24kc"]="mipsel"
            ["mipsel_24kc_24kf"]="mipsel"
            ["mipsel_74kc"]="mipsel"
            ["mipsel_mips32"]="mipsel"
            ["x86_64"]="x86_64"
            ["riscv64_generic"]="riscv64"
          )

          mkdir -p packages

          # Retrieve unique generics to minimize downloads
          unique_generics=$(printf "%s\n" "${arch_map[@]}" | sort -u)

          # Fetch release json once to get precise asset URLs
          wget -qO- --header="Authorization: token $GH_TOKEN" "https://api.github.com/repos/hufrea/byedpi/releases/tags/${TAG}" > release_data.json

          for gen_arch in $unique_generics; do
            echo "Downloading generic arch: $gen_arch ..."
            # Use grep with PCRE to extract the exact url regardless of version numbering
            url=$(grep -oP "\"browser_download_url\": \"\K.*${gen_arch}\.tar\.gz(?=\")" release_data.json | head -n 1)
            
            if [ -n "$url" ]; then
              echo "Found URL: $url"
              if wget -q "$url" -O "byedpi-${gen_arch}.tar.gz"; then
                mkdir -p "bin_${gen_arch}"
                tar -xzf "byedpi-${gen_arch}.tar.gz" -C "bin_${gen_arch}"
                echo "Extracted contents for $gen_arch:"
                find "bin_${gen_arch}"
              else
                echo "Warning: Download failed from $url. Skipping..."
              fi
            else
              echo "Warning: Release asset for $gen_arch not found. Skipping..."
            fi
          done

          # Build for explicit OpenWrt architectures
          for ow_arch in "${!arch_map[@]}"; do
            gen_arch=${arch_map[$ow_arch]}
            
            if [ ! -d "bin_${gen_arch}" ]; then
              echo "Skipping $ow_arch because generic arch $gen_arch failed to download."
              continue
            fi

            ciadpi_path=$(find "bin_${gen_arch}" -name "ciadpi*" -type f | head -n 1 || true)
            if [ -z "$ciadpi_path" ]; then
              echo "Skipping $ow_arch because ciadpi binary was not found in archive."
              continue
            fi
            echo "Building $ow_arch using binary $ciadpi_path"

            cp "$ciadpi_path" ./ciadpi

            export ARCH=$ow_arch
            export VERSION=$VERSION
            
            # Dynamic generation of nfpm config for this layout
            cat << 'EOF' > nfpm.yaml
          name: byedpi
          arch: "${ARCH}"
          platform: linux
          version: "${VERSION}"
          section: net
          priority: optional
          maintainer: "github-actions[bot]"
          description: "ByeDPI - Bypass DPI"
          homepage: "https://github.com/hufrea/byedpi"
          vendor: "hufrea"
          contents:
            - src: ./ciadpi
              dst: /usr/bin/ciadpi
              file_info:
                mode: 0755
          EOF

            # Append user's static config/init files if they exist in repo
            if [ -f "byedpi/files/byedpi.init" ]; then
              cat << 'EOF' >> nfpm.yaml
            - src: ./byedpi/files/byedpi.init
              dst: /etc/init.d/byedpi
              file_info:
                mode: 0755
          EOF
            fi
            if [ -f "byedpi/files/byedpi.config" ]; then
              cat << 'EOF' >> nfpm.yaml
            - src: ./byedpi/files/byedpi.config
              dst: /etc/config/byedpi
              file_info:
                mode: 0644
          EOF
            fi

            nfpm pkg --packager ipk --target "packages/byedpi_${VERSION}_${ow_arch}.ipk"
            nfpm pkg --packager apk --target "packages/byedpi_${VERSION}_${ow_arch}.apk"
            
            # Cleanup temp config
            rm -f nfpm.yaml ./ciadpi
          done

      - name: Update last release tag
        if: steps.get_tag.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.get_tag.outputs.tag }}" > .last_simple_release_tag
          git add .last_simple_release_tag
          git commit -m "Update simple-build release tag to ${{ steps.get_tag.outputs.tag }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        if: steps.get_tag.outputs.skip == 'false'
        with:
          name: byedpi-packages
          path: packages/*

      - name: Create GitHub Release
        if: steps.get_tag.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}-generic
          name: "ByeDPI ${{ steps.get_tag.outputs.tag }} (Generic OpenWrt Packages)"
          files: packages/*
          generate_release_notes: false
